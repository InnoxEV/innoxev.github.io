<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Innox EV | Welcome</title>
  <meta
    name="description"
    content="Choose your preferred language to enter Innox EV."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="welcome-page">
  <div class="site-shell">
    <main class="welcome-main">
      <section class="welcome-panel" aria-labelledby="welcome-title">
        <a class="welcome-logo" href="index.html" aria-label="Innox EV welcome page">
          <img
            class="welcome-logo-image"
            src="assets/images/logo-en.png"
            alt="Innox EV"
          >
        </a>
        <span class="eyebrow">Welcome to Innox</span>
        <h1 id="welcome-title">Select Your Experience</h1>
        <p class="hero-text">
          Choose your preferred language to enter Innox EV.
        </p>

        <div class="welcome-actions">
          <a class="language-card" href="en/index.html" aria-label="Continue in English">
            <span class="language-card-label">English</span>
            <span class="language-card-meta">Continue in English</span>
          </a>
          <a class="language-card" href="ar/index.html" aria-label="المتابعة باللغة العربية">
            <span class="language-card-label">العربية</span>
            <span class="language-card-meta">المتابعة باللغة العربية</span>
          </a>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
